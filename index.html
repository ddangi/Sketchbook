<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sketchbook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 관리자 알림 바 -->
  <div class="admin-bar" id="adminBar">
    ✦ 관리자 모드 — 사진을 올릴 수 있습니다
    <button class="btn btn-ghost" id="logoutBtn">로그아웃</button>
  </div>

  <!-- 헤더 -->
  <header>
    <div class="header-inner">
      <div class="logo">Sketch<span>book</span></div>
      <div class="header-actions">
        <button class="btn btn-outline" id="loginBtn">관리자 로그인</button>
        <button class="btn btn-primary" id="uploadToggleBtn" hidden>+ 사진 올리기</button>
      </div>
    </div>
  </header>

  <!-- 히어로 -->
  <section class="hero">
    <h1>손으로 그린 <em>이야기들</em></h1>
    <p>직접 그린 그림들을 모아두는 작은 갤러리</p>
  </section>

  <!-- 갤러리 영역 -->
  <main class="gallery-wrap">

    <!-- 업로드 패널 (관리자 전용) -->
    <div class="upload-panel" id="uploadPanel" hidden>
      <h3>새 그림 올리기</h3>
      <div class="form-group">
        <label>사진 선택 <span class="optional">(여러 장 동시 선택 가능)</span></label>
        <div class="drop-zone" id="dropZone">
          <input type="file" id="fileInput" accept="image/*" multiple>
          <p id="dropText">📎 클릭하거나 사진을 여기로 드래그하세요</p>
        </div>
        <!-- 다중 미리보기 그리드 -->
        <div class="preview-grid" id="previewGrid"></div>
      </div>
      <div class="form-group">
        <label>메모 <span class="optional">(선택 · 모든 사진에 동일하게 적용)</span></label>
        <textarea id="noteInput" rows="3" placeholder="이 그림에 대한 간단한 메모를 남겨보세요..."></textarea>
      </div>
      <button class="btn btn-primary btn-full" id="submitPhotoBtn">올리기</button>
    </div>

    <!-- 갤러리 그리드 -->
    <div class="gallery-grid" id="galleryGrid"></div>

    <!-- 빈 상태 -->
    <div class="empty-state" id="emptyState" hidden>
      <div class="icon">✏️</div>
      <p>아직 올린 그림이 없어요.<br>첫 번째 스케치를 올려보세요!</p>
    </div>

  </main>

  <!-- 라이트박스 -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
    <div class="lb-inner" id="lbInner">
      <div class="lb-img-wrap">
        <img id="lbImg" src="" alt="스케치 이미지">
      </div>
      <div class="lb-side">
        <button class="lb-close" id="lbClose" aria-label="닫기">✕</button>
        <div class="lb-date" id="lbDate"></div>
        <div class="lb-note" id="lbNote"></div>
        <section class="comments-section">
          <h4>댓글</h4>
          <div class="comment-list" id="commentList"></div>
          <div class="comment-form">
            <input type="text" id="commentAuthor" placeholder="이름">
            <textarea id="commentBody" placeholder="댓글을 남겨보세요..."></textarea>
            <button class="btn-sm" id="submitCommentBtn">등록</button>
          </div>
        </section>
      </div>
    </div>
  </div>

  <!-- 로그인 모달 -->
  <div class="modal-overlay" id="loginModal" role="dialog" aria-modal="true">
    <div class="modal">
      <button class="modal-close" id="loginModalClose" aria-label="닫기">✕</button>
      <h3>관리자 로그인</h3>
      <p>비밀번호를 입력하세요</p>
      <div class="error-msg" id="loginError">비밀번호가 틀렸어요.</div>
      <input type="password" id="passwordInput" placeholder="비밀번호">
      <button class="btn btn-primary btn-full" id="doLoginBtn">로그인</button>
    </div>
  </div>

  <!-- 토스트 알림 -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- JS 모듈 진입점 -->
  <script type="module" src="js/main.js"></script>

</body>
</html>
